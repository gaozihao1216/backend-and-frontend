services:
  postgres:
    image: postgres:16-alpine
    container_name: ugc-level-platform-postgres
    environment:
      POSTGRES_DB: ugc_level_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/docker/init-store.sql:/docker-entrypoint-initdb.d/001-init-store.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ugc_level_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
